# Workflow: Build and deploy Sphinx documentation to GitHub Pages.
#
# Triggers:
#   - Push to main        → deploys to  <pages-url>/latest/
#   - Release published   → deploys to  <pages-url>/<tag>/  and  <pages-url>/stable/
#   - Push to any branch  → deploys to  <pages-url>/preview/<branch>/
#   - workflow_dispatch   → manual re-run
#
# URL structure on GitHub Pages:
#   https://<owner>.github.io/<repo>/                    ← root redirect to latest/
#   https://<owner>.github.io/<repo>/latest/             ← built from main
#   https://<owner>.github.io/<repo>/stable/             ← copy of newest release
#   https://<owner>.github.io/<repo>/v1.2.3/             ← per-release snapshot
#   https://<owner>.github.io/<repo>/preview/<branch>/  ← feature branch previews

name: Build and Deploy Documentation

on:
  push:
    branches:
      - main
      - ahmo_move_to_github_pages  # TODO: remove before merging to main
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_HOME: ""
  ANDROID_SDK_ROOT: ""

jobs:
  # --------------------------------------------------------------------
  # Job 1: Build Sphinx via Bazel and deploy the versioned HTML
  # --------------------------------------------------------------------
  build-docs:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      # ------------------------------------------------------------------
      # Determine deployment target
      # ------------------------------------------------------------------
      - name: Set deployment variables
        id: vars
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          BASE_URL="https://${OWNER}.github.io/${REPO}"

          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.ref_name }}"
            DEST_DIR="${{ github.ref_name }}"
            IS_RELEASE="true"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            VERSION="latest"
            DEST_DIR="latest"
            IS_RELEASE="false"
          else
            # Feature branch → preview/<branch-name>
            BRANCH="${{ github.ref_name }}"
            BRANCH="${BRANCH//\//-}"  # replace / with - for URL safety
            VERSION="preview/${BRANCH}"
            DEST_DIR="preview/${BRANCH}"
            IS_RELEASE="false"
          fi

          echo "version=${VERSION}"     >> $GITHUB_OUTPUT
          echo "dest_dir=${DEST_DIR}"   >> $GITHUB_OUTPUT
          echo "base_url=${BASE_URL}"   >> $GITHUB_OUTPUT
          echo "is_release=${IS_RELEASE}" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------------
      # Build environment
      # ------------------------------------------------------------------
      - name: Free Disk Space (Ubuntu)
        uses: eclipse-score/more-disk-space@v1
        with:
          level: 4

      - name: Setup Bazel with shared caching
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: "docs"
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}

      - name: Allow linux-sandbox
        uses: ./actions/unblock_user_namespace_for_linux_sandbox

      # ------------------------------------------------------------------
      # Build — Bazel drives the full Sphinx pipeline including Doxygen
      # ------------------------------------------------------------------
      - name: Build Sphinx documentation via Bazel
        env:
          DOCS_VERSION: ${{ steps.vars.outputs.version }}
          DOCS_BASE_URL: ${{ steps.vars.outputs.base_url }}
        run: bazel build //docs/sphinx:sphinx_doc

      # ------------------------------------------------------------------
      # Locate HTML output (path varies by Bazel config/platform)
      # ------------------------------------------------------------------
      - name: Locate and copy Sphinx HTML output
        run: |
          HTML_SRC=$(find bazel-bin/docs/sphinx/sphinx_doc -type d -name html | head -1)
          if [[ -z "${HTML_SRC}" ]]; then
            echo "ERROR: HTML output not found under bazel-bin/docs/sphinx/sphinx_doc" >&2
            find bazel-bin/docs/sphinx -maxdepth 4 -type d | head -30
            exit 1
          fi
          echo "Found HTML at: ${HTML_SRC}"
          mkdir -p _sphinx_output
          cp -r "${HTML_SRC}/." _sphinx_output/

      # ------------------------------------------------------------------
      # Deploy versioned HTML to gh-pages branch
      # ------------------------------------------------------------------
      - name: Deploy versioned docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_sphinx_output
          destination_dir: ${{ steps.vars.outputs.dest_dir }}
          keep_files: true

      # For releases: also deploy as stable/
      - name: Deploy as stable (releases only)
        if: steps.vars.outputs.is_release == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_sphinx_output
          destination_dir: stable
          keep_files: true

      - name: Print deployed URL
        run: |
          echo "::notice::Docs deployed → ${{ steps.vars.outputs.base_url }}/${{ steps.vars.outputs.dest_dir }}/"

  # --------------------------------------------------------------------
  # Job 2: Refresh root index.html + switcher.json on gh-pages branch
  # Runs after build-docs so the new version directory already exists.
  # --------------------------------------------------------------------
  update-root:
    needs: build-docs
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Checkout gh-pages branch
        uses: actions/checkout@v6.0.2
        with:
          ref: gh-pages
          path: gh-pages

      - name: Rebuild switcher.json from deployed version directories
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          BASE_URL="https://${OWNER}.github.io/${REPO}"

          echo "[" > gh-pages/switcher.json

          # Always include latest
          echo "  {\"name\": \"latest\", \"version\": \"latest\", \"url\": \"${BASE_URL}/latest/\", \"preferred\": true}," >> gh-pages/switcher.json

          # Include stable if the directory exists
          if [[ -d "gh-pages/stable" ]]; then
            echo "  {\"name\": \"stable\", \"version\": \"stable\", \"url\": \"${BASE_URL}/stable/\"}," >> gh-pages/switcher.json
          fi

          # Include tagged releases (v*), sorted newest first
          for dir in $(find gh-pages -maxdepth 1 -type d -name 'v*' | sort -rV); do
            ver=$(basename "$dir")
            echo "  {\"name\": \"${ver}\", \"version\": \"${ver}\", \"url\": \"${BASE_URL}/${ver}/\"}," >> gh-pages/switcher.json
          done

          # Remove trailing comma on last entry and close the array
          sed -i '$ s/,$//' gh-pages/switcher.json
          echo "]" >> gh-pages/switcher.json

          echo "Generated switcher.json:"
          cat gh-pages/switcher.json

      - name: Copy root index.html from repo
        run: cp docs/sphinx/_gh_pages/index.html gh-pages/index.html

      - name: Deploy updated root files
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          keep_files: true
